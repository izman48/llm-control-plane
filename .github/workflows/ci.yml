name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Typecheck
        run: uv run mypy

      - name: Test
        run: uv run pytest

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # Deploy the co-host stack to the Hetzner box on merge to main, only after the
  # python + ui gates pass. Mirrors finance-tracker's deploy: load the SSH key,
  # then rsync + rebuild via deploy/deploy.sh (same shared box and key).
  #
  # Required repo secrets (Settings -> Secrets and variables -> Actions):
  #   SSH_HOST         box IP / hostname            (reused from finance-tracker)
  #   SSH_USER         ssh user                     (reused from finance-tracker)
  #   SSH_PRIVATE_KEY  deploy private key           (reused from finance-tracker)
  #   CONTROL_TOKEN    stable control token, baked into the UI bundle; keep it
  #                    constant across deploys or already-open consoles break.
  deploy:
    needs: [python, ui]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-vps
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Load deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy
        env:
          DEPLOY_HOST: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          CONTROL_TOKEN: ${{ secrets.CONTROL_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          ./deploy/deploy.sh
